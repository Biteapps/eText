plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.xvteam.etext'
    compileSdk 34

    defaultConfig {
        applicationId "com.xvteam.etext"
        minSdk 16
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Обязательно для minSdk < 21
        multiDexEnabled true
    }

    buildFeatures {
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    // СТАРЫЕ библиотеки для совместимости с API 16
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // Multidex для преодоления 64K лимита
    implementation 'androidx.multidex:multidex:2.0.1'

    // НЕ используем Material Components!
    // implementation 'com.google.android.material:material:1.13.0'  // УДАЛИТЬ
}